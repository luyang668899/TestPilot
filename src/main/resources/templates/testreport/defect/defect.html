<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>缺陷管理集成</title>
    <#include "../common/head.html">
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>缺陷管理集成</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                                <i class="fa fa-wrench"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-user">
                                <li><a href="${ctx}/testreport/defect/add">添加缺陷管理配置</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-sm-12">
                                <form class="form-inline" id="searchForm">
                                    <div class="form-group">
                                        <label class="sr-only" for="projectId">项目</label>
                                        <select class="form-control" id="projectId" name="projectId">
                                            <option value="">全部项目</option>
                                            <#list projects as project>
                                                <option value="${project.projectId}">${project.projectName}</option>
                                            </#list>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="defectType">缺陷系统类型</label>
                                        <select class="form-control" id="defectType" name="defectType">
                                            <option value="">全部类型</option>
                                            <option value="1">JIRA</option>
                                            <option value="2">Bugzilla</option>
                                            <option value="3">其他</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="status">状态</label>
                                        <select class="form-control" id="status" name="status">
                                            <option value="">全部状态</option>
                                            <option value="1">启用</option>
                                            <option value="0">禁用</option>
                                        </select>
                                    </div>
                                    <button type="button" class="btn btn-primary" onclick="$.table.search()">
                                        <i class="fa fa-search"></i> 搜索
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="row">
                            <div class="col-sm-12">
                                <table class="table table-striped table-bordered table-hover" id="dataTable">
                                    <thead>
                                        <tr>
                                            <th><input type="checkbox" class="i-checks" name="ids" id="ids" /></th>
                                            <th>缺陷管理ID</th>
                                            <th>项目名称</th>
                                            <th>缺陷系统类型</th>
                                            <th>缺陷系统名称</th>
                                            <th>缺陷系统URL</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <#include "../common/foot.html">
    <script type="text/javascript">
        $(function() {
            $.table.init({
                url: ctx + "testreport/defect/list",
                columns: [
                    {
                        field: 'selectItem',
                        radio: false,
                        checkbox: true
                    },
                    {
                        field: 'defectId',
                        title: '缺陷管理ID'
                    },
                    {
                        field: 'projectName',
                        title: '项目名称'
                    },
                    {
                        field: 'defectType',
                        title: '缺陷系统类型',
                        formatter: function(value) {
                            if (value == 1) return 'JIRA';
                            if (value == 2) return 'Bugzilla';
                            if (value == 3) return '其他';
                            return '未知';
                        }
                    },
                    {
                        field: 'defectSystemName',
                        title: '缺陷系统名称'
                    },
                    {
                        field: 'defectSystemUrl',
                        title: '缺陷系统URL'
                    },
                    {
                        field: 'status',
                        title: '状态',
                        formatter: function(value) {
                            if (value == 1) return '<span class="label label-success">启用</span>';
                            if (value == 0) return '<span class="label label-danger">禁用</span>';
                            return '未知';
                        }
                    },
                    {
                        field: 'operate',
                        title: '操作',
                        formatter: function(value, row, index) {
                            var actions = [];
                            actions.push('<a class="btn btn-xs btn-primary" href="' + ctx + 'testreport/defect/edit/' + row.defectId + '" title="编辑"><i class="fa fa-pencil"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-success" href="javascript:;" onclick="testConnection(' + row.defectId + ')" title="测试连接"><i class="fa fa-plug"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-warning" href="javascript:;" onclick="syncDefectData(' + row.defectId + ')" title="同步缺陷"><i class="fa fa-refresh"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-danger" href="javascript:;" onclick="deleteDefect(' + row.defectId + ')" title="删除"><i class="fa fa-trash"></i></a> ');
                            return actions.join('');
                        }
                    }
                ]
            });
        });

        // 测试连接
        function testConnection(defectId) {
            $.ajax({
                type: "post",
                url: ctx + "testreport/defect/testConnection",
                data: {"defectId": defectId},
                success: function(result) {
                    $.modal.alertSuccess(result.msg);
                }
            });
        }

        // 同步缺陷数据
        function syncDefectData(defectId) {
            $.modal.confirm("确定要同步缺陷数据吗？", function() {
                $.ajax({
                    type: "post",
                    url: ctx + "testreport/defect/sync",
                    data: {"defectId": defectId},
                    success: function(result) {
                        $.operate.successCallback(result);
                        $.table.refresh();
                    }
                });
            });
        }

        // 删除缺陷管理配置
        function deleteDefect(defectId) {
            $.modal.confirm("确定要删除该缺陷管理配置吗？", function() {
                $.ajax({
                    type: "post",
                    url: ctx + "testreport/defect/remove",
                    data: {"ids": defectId},
                    success: function(result) {
                        $.operate.successCallback(result);
                        $.table.refresh();
                    }
                });
            });
        }
    </script>
</body>
</html>
