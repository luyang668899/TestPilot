<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试趋势分析</title>
    <#include "../common/head.html">
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>测试趋势分析</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-sm-12">
                                <form class="form-inline" id="searchForm">
                                    <div class="form-group">
                                        <label class="sr-only" for="projectId">项目</label>
                                        <select class="form-control" id="projectId" name="projectId">
                                            <option value="">全部项目</option>
                                            <#list projects as project>
                                                <option value="${project.projectId}">${project.projectName}</option>
                                            </#list>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="trendType">趋势类型</label>
                                        <select class="form-control" id="trendType" name="trendType">
                                            <option value="">全部类型</option>
                                            <option value="1">执行次数</option>
                                            <option value="2">成功率</option>
                                            <option value="3">执行时长</option>
                                        </select>
                                    </div>
                                    <button type="button" class="btn btn-primary" onclick="$.table.search()">
                                        <i class="fa fa-search"></i> 搜索
                                    </button>
                                    <button type="button" class="btn btn-success" onclick="generateTrendData()">
                                        <i class="fa fa-refresh"></i> 生成趋势数据
                                    </button>
                                    <button type="button" class="btn btn-warning" onclick="predictTrend()">
                                        <i class="fa fa-line-chart"></i> 预测趋势
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="row">
                            <div class="col-sm-12">
                                <#-- 趋势图表 -->
                                <div id="trendChart" style="height: 400px;"></div>
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="row">
                            <div class="col-sm-12">
                                <table class="table table-striped table-bordered table-hover" id="dataTable">
                                    <thead>
                                        <tr>
                                            <th><input type="checkbox" class="i-checks" name="ids" id="ids" /></th>
                                            <th>趋势ID</th>
                                            <th>项目名称</th>
                                            <th>趋势类型</th>
                                            <th>统计日期</th>
                                            <th>执行次数</th>
                                            <th>成功次数</th>
                                            <th>失败次数</th>
                                            <th>成功率</th>
                                            <th>平均执行时长(秒)</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <#include "../common/foot.html">
    <script type="text/javascript">
        $(function() {
            $.table.init({
                url: ctx + "testreport/trend/list",
                columns: [
                    {
                        field: 'selectItem',
                        radio: false,
                        checkbox: true
                    },
                    {
                        field: 'trendId',
                        title: '趋势ID'
                    },
                    {
                        field: 'projectName',
                        title: '项目名称'
                    },
                    {
                        field: 'trendType',
                        title: '趋势类型',
                        formatter: function(value) {
                            if (value == 1) return '执行次数';
                            if (value == 2) return '成功率';
                            if (value == 3) return '执行时长';
                            return '未知';
                        }
                    },
                    {
                        field: 'statisticsDate',
                        title: '统计日期'
                    },
                    {
                        field: 'executionCount',
                        title: '执行次数'
                    },
                    {
                        field: 'successCount',
                        title: '成功次数'
                    },
                    {
                        field: 'failureCount',
                        title: '失败次数'
                    },
                    {
                        field: 'successRate',
                        title: '成功率',
                        formatter: function(value) {
                            return (value * 100).toFixed(2) + '%';
                        }
                    },
                    {
                        field: 'avgExecutionTime',
                        title: '平均执行时长(秒)'
                    },
                    {
                        field: 'operate',
                        title: '操作',
                        formatter: function(value, row, index) {
                            var actions = [];
                            actions.push('<a class="btn btn-xs btn-primary" href="' + ctx + 'testreport/trend/detail/' + row.trendId + '" title="查看详情"><i class="fa fa-eye"></i></a> ');
                            return actions.join('');
                        }
                    }
                ]
            });

            // 初始化图表
            initTrendChart();
        });

        // 生成趋势数据
        function generateTrendData() {
            var projectId = $('#projectId').val();
            if (!projectId) {
                $.modal.alertWarning("请选择项目");
                return;
            }
            $.modal.confirm("确定要生成趋势数据吗？", function() {
                $.ajax({
                    type: "post",
                    url: ctx + "testreport/trend/generate",
                    data: {"projectId": projectId},
                    success: function(result) {
                        $.operate.successCallback(result);
                        $.table.refresh();
                        initTrendChart();
                    }
                });
            });
        }

        // 预测趋势
        function predictTrend() {
            var projectId = $('#projectId').val();
            if (!projectId) {
                $.modal.alertWarning("请选择项目");
                return;
            }
            var days = prompt("请输入预测天数：", "7");
            if (days && !isNaN(days)) {
                $.ajax({
                    type: "post",
                    url: ctx + "testreport/trend/predict",
                    data: {"projectId": projectId, "days": days},
                    success: function(result) {
                        if (result.code == 0) {
                            var prediction = result.prediction;
                            $.modal.alertSuccess("预测结果：\n" +
                                "预测日期：" + prediction.statisticsDate + "\n" +
                                "预测执行次数：" + prediction.executionCount + "\n" +
                                "预测成功率：" + (prediction.successRate * 100).toFixed(2) + "%\n" +
                                "预测平均执行时长：" + prediction.avgExecutionTime + "秒");
                        } else {
                            $.modal.alertError(result.msg);
                        }
                    }
                });
            }
        }

        // 初始化趋势图表
        function initTrendChart() {
            var projectId = $('#projectId').val();
            var trendType = $('#trendType').val();
            $.ajax({
                type: "post",
                url: ctx + "testreport/trend/list",
                data: {"projectId": projectId, "trendType": trendType},
                success: function(result) {
                    if (result.code == 0) {
                        var data = result.rows;
                        var dates = [];
                        var values = [];
                        var typeName = "执行次数";

                        if (trendType == 2) {
                            typeName = "成功率";
                        } else if (trendType == 3) {
                            typeName = "执行时长";
                        }

                        for (var i = 0; i < data.length; i++) {
                            dates.push(data[i].statisticsDate);
                            if (trendType == 2) {
                                values.push((data[i].successRate * 100).toFixed(2));
                            } else if (trendType == 3) {
                                values.push(data[i].avgExecutionTime);
                            } else {
                                values.push(data[i].executionCount);
                            }
                        }

                        var myChart = echarts.init(document.getElementById('trendChart'));
                        var option = {
                            title: {
                                text: '测试趋势分析',
                                subtext: typeName + '趋势'
                            },
                            tooltip: {
                                trigger: 'axis'
                            },
                            legend: {
                                data: [typeName]
                            },
                            xAxis: {
                                type: 'category',
                                data: dates
                            },
                            yAxis: {
                                type: 'value',
                                name: typeName
                            },
                            series: [{
                                data: values,
                                type: 'line',
                                smooth: true
                            }]
                        };
                        myChart.setOption(option);
                    }
                }
            });
        }
    </script>
</body>
</html>
