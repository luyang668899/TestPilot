<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header" />
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>新增环境</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="close-link">
                                <i class="fa fa-times"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <form class="form-horizontal m-t" id="form-environment-add">
                            <div class="form-group">
                                <label class="col-sm-3 control-label">所属项目：</label>
                                <div class="col-sm-8">
                                    <select name="projectId" class="form-control m-b" required>
                                        <option value="">请选择项目</option>
                                        <option th:each="project : ${projects}" th:value="${project.projectId}" th:text="${project.projectName}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">环境名称：</label>
                                <div class="col-sm-8">
                                    <input id="environmentName" name="environmentName" class="form-control" type="text" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">环境描述：</label>
                                <div class="col-sm-8">
                                    <input id="environmentDesc" name="environmentDesc" class="form-control" type="text">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">备注：</label>
                                <div class="col-sm-8">
                                    <textarea id="remark" name="remark" class="form-control"></textarea>
                                </div>
                            </div>
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <div class="col-sm-4 col-sm-offset-3">
                                    <button class="btn btn-primary" type="submit">提交</button>
                                    <button class="btn btn-white" type="button" onclick="history.back(-1);">取消</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "testmanagmt/environment";

        $(function() {
            validateRule();
        });

        $.validator.setDefaults({
            submitHandler: function() {
                submitHandler();
            }
        });

        function validateRule() {
            var icon = "<i class='fa fa-times-circle'></i> ";
            $("#form-environment-add").validate({
                rules: {
                    projectId: {
                        required: true
                    },
                    environmentName: {
                        required: true,
                        minlength: 2,
                        maxlength: 50
                    }
                },
                messages: {
                    projectId: {
                        required: icon + "请选择所属项目"
                    },
                    environmentName: {
                        required: icon + "请输入环境名称",
                        minlength: icon + "环境名称长度不能小于2个字符",
                        maxlength: icon + "环境名称长度不能超过50个字符"
                    }
                }
            });
        }

        function submitHandler() {
            $.operate.save(prefix + "/add", $('#form-environment-add').serialize());
        }
    </script>
</body>
</html>
