<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Jenkins集成管理</title>
    <#include "../../../common/head.html">
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>Jenkins集成管理</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                                <i class="fa fa-wrench"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-user">
                                <li><a href="${ctx}/testmanagmt/cicd/jenkins/add">添加Jenkins配置</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-sm-12">
                                <form class="form-inline" id="searchForm">
                                    <div class="form-group">
                                        <label class="sr-only" for="projectId">项目</label>
                                        <select class="form-control" id="projectId" name="projectId">
                                            <option value="">全部项目</option>
                                            <#list projects as project>
                                                <option value="${project.projectId}">${project.projectName}</option>
                                            </#list>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="status">状态</label>
                                        <select class="form-control" id="status" name="status">
                                            <option value="">全部状态</option>
                                            <option value="1">启用</option>
                                            <option value="0">禁用</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="jenkinsName">Jenkins名称</label>
                                        <input type="text" class="form-control" id="jenkinsName" name="jenkinsName" placeholder="请输入Jenkins名称">
                                    </div>
                                    <button type="button" class="btn btn-primary" onclick="$.table.search()">
                                        <i class="fa fa-search"></i> 搜索
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="row">
                            <div class="col-sm-12">
                                <table class="table table-striped table-bordered table-hover" id="dataTable">
                                    <thead>
                                        <tr>
                                            <th><input type="checkbox" class="i-checks" name="ids" id="ids" /></th>
                                            <th>Jenkins ID</th>
                                            <th>项目名称</th>
                                            <th>Jenkins名称</th>
                                            <th>Jenkins URL</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <#include "../../../common/foot.html">
    <script type="text/javascript">
        $(function() {
            $.table.init({
                url: ctx + "testmanagmt/cicd/jenkins/list",
                columns: [
                    {
                        field: 'selectItem',
                        radio: false,
                        checkbox: true
                    },
                    {
                        field: 'jenkinsId',
                        title: 'Jenkins ID'
                    },
                    {
                        field: 'projectName',
                        title: '项目名称'
                    },
                    {
                        field: 'jenkinsName',
                        title: 'Jenkins名称'
                    },
                    {
                        field: 'jenkinsUrl',
                        title: 'Jenkins URL'
                    },
                    {
                        field: 'status',
                        title: '状态',
                        formatter: function(value) {
                            if (value == 1) return '<span class="label label-success">启用</span>';
                            if (value == 0) return '<span class="label label-danger">禁用</span>';
                            return '未知';
                        }
                    },
                    {
                        field: 'operate',
                        title: '操作',
                        formatter: function(value, row, index) {
                            var actions = [];
                            actions.push('<a class="btn btn-xs btn-primary" href="' + ctx + 'testmanagmt/cicd/jenkins/edit/' + row.jenkinsId + '" title="编辑"><i class="fa fa-pencil"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-success" href="javascript:;" onclick="testConnection(' + row.jenkinsId + ')" title="测试连接"><i class="fa fa-plug"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-warning" href="javascript:;" onclick="getJenkinsJobs(' + row.jenkinsId + ')" title="获取任务"><i class="fa fa-list"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-danger" href="javascript:;" onclick="deleteJenkins(' + row.jenkinsId + ')" title="删除"><i class="fa fa-trash"></i></a> ');
                            return actions.join('');
                        }
                    }
                ]
            });
        });

        // 测试连接
        function testConnection(jenkinsId) {
            $.ajax({
                type: "post",
                url: ctx + "testmanagmt/cicd/jenkins/testConnection",
                data: {"jenkinsId": jenkinsId},
                success: function(result) {
                    $.modal.alertSuccess(result.msg);
                }
            });
        }

        // 获取Jenkins任务列表
        function getJenkinsJobs(jenkinsId) {
            $.ajax({
                type: "post",
                url: ctx + "testmanagmt/cicd/jenkins/jobs",
                data: {"jenkinsId": jenkinsId},
                success: function(result) {
                    if (result.code == 0) {
                        var jobs = result.jobs;
                        if (jobs.length > 0) {
                            var jobList = jobs.join('\n');
                            $.modal.alertSuccess("Jenkins任务列表：\n" + jobList);
                        } else {
                            $.modal.alertWarning("未找到Jenkins任务");
                        }
                    } else {
                        $.modal.alertError(result.msg);
                    }
                }
            });
        }

        // 删除Jenkins配置
        function deleteJenkins(jenkinsId) {
            $.modal.confirm("确定要删除该Jenkins配置吗？", function() {
                $.ajax({
                    type: "post",
                    url: ctx + "testmanagmt/cicd/jenkins/remove",
                    data: {"ids": jenkinsId},
                    success: function(result) {
                        $.operate.successCallback(result);
                        $.table.refresh();
                    }
                });
            });
        }
    </script>
</body>
</html>
