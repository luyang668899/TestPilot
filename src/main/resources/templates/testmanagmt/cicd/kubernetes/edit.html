<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <th:block th:include="include :: header" />
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>编辑Kubernetes配置</h5>
                    </div>
                    <div class="ibox-content">
                        <form class="form-horizontal m-t" id="formEdit">
                            <input type="hidden" name="kubernetesId" th:value="${ciCdKubernetes.kubernetesId}">
                            <div class="form-group">
                                <label class="col-sm-3 control-label">Kubernetes名称：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="kubernetesName" th:value="${ciCdKubernetes.kubernetesName}" placeholder="请输入Kubernetes名称" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">集群地址：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="clusterUrl" th:value="${ciCdKubernetes.clusterUrl}" placeholder="请输入集群地址，例如：https://kubernetes.example.com:6443" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">命名空间：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="namespace" th:value="${ciCdKubernetes.namespace}" placeholder="请输入命名空间，例如：default" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">认证方式：</label>
                                <div class="col-sm-8">
                                    <select class="form-control m-b" name="authType" required>
                                        <option value="kubeconfig" th:selected="${ciCdKubernetes.authType eq 'kubeconfig'}">Kubeconfig文件</option>
                                        <option value="token" th:selected="${ciCdKubernetes.authType eq 'token'}">Token</option>
                                        <option value="cert" th:selected="${ciCdKubernetes.authType eq 'cert'}">证书</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">Kubeconfig文件路径：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="kubeconfigPath" th:value="${ciCdKubernetes.kubeconfigPath}" placeholder="请输入Kubeconfig文件路径，例如：~/.kube/config" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">状态：</label>
                                <div class="col-sm-8">
                                    <select class="form-control m-b" name="status" required>
                                        <option value="启用" th:selected="${ciCdKubernetes.status eq '启用'}">启用</option>
                                        <option value="禁用" th:selected="${ciCdKubernetes.status eq '禁用'}">禁用</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">描述：</label>
                                <div class="col-sm-8">
                                    <textarea class="form-control" name="description" placeholder="请输入描述" rows="3" th:text="${ciCdKubernetes.description}"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-sm-4 col-sm-offset-3">
                                    <button class="btn btn-primary" type="submit"><i class="fa fa-check"></i> 保存</button>
                                    <button class="btn btn-white" type="button" onclick="closeModal()"><i class="fa fa-times"></i> 取消</button>
                                    <button class="btn btn-success" type="button" id="btnTestConnection" style="margin-left: 10px;"><i class="fa fa-play"></i> 测试连接</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "testmanagmt/kubernetes";

        $(function() {
            $('#formEdit').validate({
                rules: {
                    kubernetesName: {
                        required: true,
                        maxlength: 50
                    },
                    clusterUrl: {
                        required: true,
                        maxlength: 100
                    },
                    namespace: {
                        required: true,
                        maxlength: 50
                    },
                    kubeconfigPath: {
                        required: true,
                        maxlength: 200
                    }
                },
                submitHandler: function(form) {
                    $.ajax({
                        type: "post",
                        url: prefix + "/edit",
                        data: $(form).serialize(),
                        success: function(data) {
                            if (data.code == 0) {
                                parent.layer.msg(data.msg, {icon: 1});
                                parent.reLoad();
                                var index = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(index);
                            } else {
                                layer.msg(data.msg, {icon: 5});
                            }
                        }
                    });
                }
            });

            $('#btnTestConnection').click(function() {
                var clusterUrl = $('input[name="clusterUrl"]').val();
                var namespace = $('input[name="namespace"]').val();
                var authType = $('select[name="authType"]').val();
                var kubeconfigPath = $('input[name="kubeconfigPath"]').val();

                if (!clusterUrl || !namespace || !kubeconfigPath) {
                    layer.msg('请填写集群地址、命名空间和Kubeconfig路径', {icon: 5});
                    return;
                }

                $.ajax({
                    url: prefix + '/testConnection',
                    type: 'post',
                    data: { 'clusterUrl': clusterUrl, 'namespace': namespace, 'authType': authType, 'kubeconfigPath': kubeconfigPath },
                    success: function(data) {
                        layer.msg(data.msg, {icon: 1});
                    }
                });
            });
        });

        function closeModal() {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        }
    </script>
</body>
</html>
