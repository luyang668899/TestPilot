<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GitLab CI/CD集成管理</title>
    <#include "../../../common/head.html">
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>GitLab CI/CD集成管理</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                                <i class="fa fa-wrench"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-user">
                                <li><a href="${ctx}/testmanagmt/cicd/gitlab/add">添加GitLab配置</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-sm-12">
                                <form class="form-inline" id="searchForm">
                                    <div class="form-group">
                                        <label class="sr-only" for="projectId">项目</label>
                                        <select class="form-control" id="projectId" name="projectId">
                                            <option value="">全部项目</option>
                                            <#list projects as project>
                                                <option value="${project.projectId}">${project.projectName}</option>
                                            </#list>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="status">状态</label>
                                        <select class="form-control" id="status" name="status">
                                            <option value="">全部状态</option>
                                            <option value="1">启用</option>
                                            <option value="0">禁用</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="gitlabName">GitLab名称</label>
                                        <input type="text" class="form-control" id="gitlabName" name="gitlabName" placeholder="请输入GitLab名称">
                                    </div>
                                    <button type="button" class="btn btn-primary" onclick="$.table.search()">
                                        <i class="fa fa-search"></i> 搜索
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="row">
                            <div class="col-sm-12">
                                <table class="table table-striped table-bordered table-hover" id="dataTable">
                                    <thead>
                                        <tr>
                                            <th><input type="checkbox" class="i-checks" name="ids" id="ids" /></th>
                                            <th>GitLab ID</th>
                                            <th>项目名称</th>
                                            <th>GitLab名称</th>
                                            <th>GitLab URL</th>
                                            <th>项目路径</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <#include "../../../common/foot.html">
    <script type="text/javascript">
        $(function() {
            $.table.init({
                url: ctx + "testmanagmt/cicd/gitlab/list",
                columns: [
                    {
                        field: 'selectItem',
                        radio: false,
                        checkbox: true
                    },
                    {
                        field: 'gitlabId',
                        title: 'GitLab ID'
                    },
                    {
                        field: 'projectName',
                        title: '项目名称'
                    },
                    {
                        field: 'gitlabName',
                        title: 'GitLab名称'
                    },
                    {
                        field: 'gitlabUrl',
                        title: 'GitLab URL'
                    },
                    {
                        field: 'projectPath',
                        title: '项目路径'
                    },
                    {
                        field: 'status',
                        title: '状态',
                        formatter: function(value) {
                            if (value == 1) return '<span class="label label-success">启用</span>';
                            if (value == 0) return '<span class="label label-danger">禁用</span>';
                            return '未知';
                        }
                    },
                    {
                        field: 'operate',
                        title: '操作',
                        formatter: function(value, row, index) {
                            var actions = [];
                            actions.push('<a class="btn btn-xs btn-primary" href="' + ctx + 'testmanagmt/cicd/gitlab/edit/' + row.gitlabId + '" title="编辑"><i class="fa fa-pencil"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-success" href="javascript:;" onclick="testConnection(' + row.gitlabId + ')" title="测试连接"><i class="fa fa-plug"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-warning" href="javascript:;" onclick="getGitLabPipelines(' + row.gitlabId + ')" title="获取流水线"><i class="fa fa-list"></i></a> ');
                            actions.push('<a class="btn btn-xs btn-danger" href="javascript:;" onclick="deleteGitLab(' + row.gitlabId + ')" title="删除"><i class="fa fa-trash"></i></a> ');
                            return actions.join('');
                        }
                    }
                ]
            });
        });

        // 测试连接
        function testConnection(gitlabId) {
            $.ajax({
                type: "post",
                url: ctx + "testmanagmt/cicd/gitlab/testConnection",
                data: {"gitlabId": gitlabId},
                success: function(result) {
                    $.modal.alertSuccess(result.msg);
                }
            });
        }

        // 获取GitLab流水线列表
        function getGitLabPipelines(gitlabId) {
            $.ajax({
                type: "post",
                url: ctx + "testmanagmt/cicd/gitlab/pipelines",
                data: {"gitlabId": gitlabId},
                success: function(result) {
                    if (result.code == 0) {
                        var pipelines = result.pipelines;
                        if (pipelines.length > 0) {
                            var pipelineList = pipelines.join('\n');
                            $.modal.alertSuccess("GitLab流水线列表：\n" + pipelineList);
                        } else {
                            $.modal.alertWarning("未找到GitLab流水线");
                        }
                    } else {
                        $.modal.alertError(result.msg);
                    }
                }
            });
        }

        // 删除GitLab配置
        function deleteGitLab(gitlabId) {
            $.modal.confirm("确定要删除该GitLab配置吗？", function() {
                $.ajax({
                    type: "post",
                    url: ctx + "testmanagmt/cicd/gitlab/remove",
                    data: {"ids": gitlabId},
                    success: function(result) {
                        $.operate.successCallback(result);
                        $.table.refresh();
                    }
                });
            });
        }
    </script>
</body>
</html>
