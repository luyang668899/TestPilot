<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>云测试执行</title>
    <#include "../include.html" />
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>云测试执行</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                                <i class="fa fa-wrench"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-user">
                                <li><a href="#">导出数据</a></li>
                            </ul>
                            <a class="close-link">
                                <i class="fa fa-times"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-sm-12">
                                <form id="form-search" class="form-inline">
                                    <div class="form-group">
                                        <label class="sr-only" for="serviceId">服务ID</label>
                                        <input type="number" class="form-control" id="serviceId" name="serviceId" placeholder="服务ID">
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="resourceId">资源ID</label>
                                        <input type="number" class="form-control" id="resourceId" name="resourceId" placeholder="资源ID">
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="testTaskId">测试任务ID</label>
                                        <input type="number" class="form-control" id="testTaskId" name="testTaskId" placeholder="测试任务ID">
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="status">状态</label>
                                        <input type="text" class="form-control" id="status" name="status" placeholder="状态">
                                    </div>
                                    <button type="button" class="btn btn-primary" onclick="$.table.search()">
                                        <i class="fa fa-search"></i> 搜索
                                    </button>
                                    <button type="button" class="btn btn-white" onclick="$.form.reset()">
                                        <i class="fa fa-refresh"></i> 重置
                                    </button>
                                    <button type="button" class="btn btn-success" onclick="executeTest()">
                                        <i class="fa fa-play"></i> 执行测试
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="row">
                            <div class="col-sm-12">
                                <table id="bootstrap-table" class="table table-striped table-bordered table-hover"></table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "云测试执行",
                columns: [
                    {
                        checkbox: true
                    },
                    {
                        field: 'executionId',
                        title: '执行ID',
                        sortable: true
                    },
                    {
                        field: 'serviceId',
                        title: '服务ID',
                        sortable: true
                    },
                    {
                        field: 'resourceId',
                        title: '资源ID',
                        sortable: true
                    },
                    {
                        field: 'testTaskId',
                        title: '测试任务ID',
                        sortable: true
                    },
                    {
                        field: 'status',
                        title: '状态',
                        sortable: true
                    },
                    {
                        field: 'startTime',
                        title: '开始时间',
                        sortable: true
                    },
                    {
                        field: 'endTime',
                        title: '结束时间',
                        sortable: true
                    },
                    {
                        field: 'result',
                        title: '执行结果',
                        formatter: function(value) {
                            return value ? value.substring(0, 50) + '...' : '';
                        }
                    },
                    {
                        title: '操作',
                        align: 'center',
                        formatter: function(value, row, index) {
                            var actions = [];
                            actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="getExecutionStatus(' + row.executionId + ')"><i class="fa fa-refresh"></i> 刷新状态</a> ');
                            actions.push('<a class="btn btn-primary btn-xs" href="javascript:void(0)" onclick="getExecutionResult(' + row.executionId + ')"><i class="fa fa-file-text-o"></i> 查看结果</a> ');
                            if (row.status == 'RUNNING' || row.status == 'PENDING') {
                                actions.push('<a class="btn btn-warning btn-xs" href="javascript:void(0)" onclick="stopExecution(' + row.executionId + ')"><i class="fa fa-stop"></i> 停止执行</a> ');
                            }
                            actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(' + row.executionId + ')"><i class="fa fa-remove"></i> 删除</a> ');
                            return actions.join('');
                        }
                    }
                ]
            };
            $.table.init(options);
        });

        function executeTest() {
            var html = '';
            html += '<div class="form-group">';
            html += '<label class="col-sm-3 control-label">服务ID：</label>';
            html += '<div class="col-sm-8"><input type="number" class="form-control" id="serviceId" name="serviceId" required></div>';
            html += '</div>';
            html += '<div class="form-group">';
            html += '<label class="col-sm-3 control-label">资源ID：</label>';
            html += '<div class="col-sm-8"><input type="number" class="form-control" id="resourceId" name="resourceId" required></div>';
            html += '</div>';
            html += '<div class="form-group">';
            html += '<label class="col-sm-3 control-label">测试任务ID：</label>';
            html += '<div class="col-sm-8"><input type="number" class="form-control" id="testTaskId" name="testTaskId" required></div>';
            html += '</div>';
            
            layer.open({
                type: 1,
                title: '执行云测试',
                area: ['500px', '250px'],
                content: '<form id="execute-form" class="form-horizontal m-t"><div class="ibox-content">' + html + '</div></form>',
                btn: ['确定', '取消'],
                btn1: function(index, layero) {
                    var serviceId = $('#serviceId').val();
                    var resourceId = $('#resourceId').val();
                    var testTaskId = $('#testTaskId').val();
                    
                    if (!serviceId || !resourceId || !testTaskId) {
                        layer.msg('请填写必要参数', {icon: 2});
                        return;
                    }
                    
                    $.ajax({
                        type: 'post',
                        url: prefix + '/execute',
                        data: {
                            serviceId: serviceId,
                            resourceId: resourceId,
                            testTaskId: testTaskId
                        },
                        success: function(result) {
                            if (result.code == 0) {
                                layer.msg('测试执行开始', {icon: 1});
                                layer.close(index);
                                $.table.refresh();
                            } else {
                                layer.msg(result.msg, {icon: 2});
                            }
                        }
                    });
                }
            });
        }

        function getExecutionStatus(executionId) {
            $.ajax({
                type: 'post',
                url: prefix + '/status',
                data: {executionId: executionId},
                success: function(result) {
                    if (result.code == 0) {
                        layer.msg('状态：' + result.data, {icon: 1});
                        $.table.refresh();
                    } else {
                        layer.msg(result.msg, {icon: 2});
                    }
                }
            });
        }

        function getExecutionResult(executionId) {
            $.ajax({
                type: 'post',
                url: prefix + '/result',
                data: {executionId: executionId},
                success: function(result) {
                    if (result.code == 0) {
                        layer.open({
                            type: 1,
                            title: '测试执行结果',
                            area: ['600px', '300px'],
                            content: '<div class="ibox-content"><pre>' + result.data + '</pre></div>'
                        });
                    } else {
                        layer.msg(result.msg, {icon: 2});
                    }
                }
            });
        }

        function stopExecution(executionId) {
            layer.confirm('确定要停止该测试执行吗？', function(index) {
                $.ajax({
                    type: 'post',
                    url: prefix + '/stop',
                    data: {executionId: executionId},
                    success: function(result) {
                        if (result.code == 0) {
                            layer.msg('测试执行已停止', {icon: 1});
                            $.table.refresh();
                        } else {
                            layer.msg(result.msg, {icon: 2});
                        }
                    }
                });
                layer.close(index);
            });
        }
    </script>
</body>
</html>
