<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <th:block th:include="include :: header" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formSearch" class="form-inline">
                    <div class="form-group">
                        <label class="control-label">云服务名称：</label>
                        <input type="text" name="cloudName" class="form-control" placeholder="请输入云服务名称" />
                    </div>
                    <div class="form-group">
                        <label class="control-label">云服务类型：</label>
                        <select name="cloudType" class="form-control m-b">
                            <option value="">全部</option>
                            <option value="AWS">AWS</option>
                            <option value="Azure">Azure</option>
                            <option value="GCP">GCP</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="control-label">状态：</label>
                        <select name="status" class="form-control m-b">
                            <option value="">全部</option>
                            <option value="启用">启用</option>
                            <option value="禁用">禁用</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fa fa-search"></i> 搜索</button>
                    <button type="button" class="btn btn-white" id="reset">重置</button>
                </form>
            </div>

            <div class="col-sm-12">
                <div class="btn-group">
                    <button type="button" class="btn btn-primary" id="btnAdd"><i class="fa fa-plus"></i> 新增</button>
                    <button type="button" class="btn btn-danger" id="btnDelete"><i class="fa fa-remove"></i> 删除</button>
                    <button type="button" class="btn btn-success" id="btnTest"><i class="fa fa-play"></i> 测试连接</button>
                    <button type="button" class="btn btn-info" id="btnListResources"><i class="fa fa-list"></i> 列出资源</button>
                </div>
                <div class="btn-group">
                    <a href="/cloud/resource" class="btn btn-primary"><i class="fa fa-server"></i> 云资源管理</a>
                    <a href="/cloud/execution" class="btn btn-success"><i class="fa fa-play-circle"></i> 云测试执行</a>
                    <button type="button" class="btn btn-info" id="btnExcel"><i class="fa fa-file-excel-o"></i> 导出</button>
                </div>
            </div>

            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table" data-toolbar="#toolbar" data-search="false" data-show-columns="true" data-show-export="false" data-show-refresh="true" data-show-toggle="true" data-pagination="true" data-page-size="10" data-page-list="[10, 20, 50, 100, 200]">
                </table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "cloud";

        $(function() {
            load();
        });

        function load() {
            $('#bootstrap-table').bootstrapTable({
                url: prefix + '/list',
                columns: [
                    {
                        checkbox: true
                    },
                    {
                        field: 'cloudId',
                        title: 'ID',
                        align: 'center',
                        width: '50px'
                    },
                    {
                        field: 'cloudName',
                        title: '云服务名称',
                        align: 'left'
                    },
                    {
                        field: 'cloudType',
                        title: '云服务类型',
                        align: 'center',
                        width: '100px'
                    },
                    {
                        field: 'accessKey',
                        title: '访问密钥',
                        align: 'left'
                    },
                    {
                        field: 'region',
                        title: '区域',
                        align: 'center',
                        width: '120px'
                    },
                    {
                        field: 'status',
                        title: '状态',
                        align: 'center',
                        width: '80px',
                        formatter: function(value, row, index) {
                            if (value === '启用') {
                                return '<span class="label label-success">' + value + '</span>';
                            } else {
                                return '<span class="label label-danger">' + value + '</span>';
                            }
                        }
                    },
                    {
                        field: 'description',
                        title: '描述',
                        align: 'left'
                    },
                    {
                        field: 'createBy',
                        title: '创建者',
                        align: 'center',
                        width: '100px'
                    },
                    {
                        field: 'createTime',
                        title: '创建时间',
                        align: 'center',
                        width: '180px',
                        formatter: function(value, row, index) {
                            return value ? moment(value).format('YYYY-MM-DD HH:mm:ss') : '';
                        }
                    },
                    {
                        title: '操作',
                        align: 'center',
                        width: '250px',
                        formatter: function(value, row, index) {
                            var actions = [];
                            actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="testConnection(' + row.cloudId + ')"><i class="fa fa-play"></i> 测试连接</a> ');
                            actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="listResources(' + row.cloudId + ')"><i class="fa fa-list"></i> 列出资源</a> ');
                            actions.push('<a class="btn btn-primary btn-xs" href="javascript:void(0)" onclick="edit(' + row.cloudId + ')"><i class="fa fa-edit"></i> 编辑</a> ');
                            actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="remove(' + row.cloudId + ')"><i class="fa fa-remove"></i> 删除</a>');
                            return actions.join('');
                        }
                    }
                ]
            });
        }

        function reLoad() {
            $('#bootstrap-table').bootstrapTable('refresh');
        }

        $('#btnAdd').click(function() {
            openModal('新增云服务', prefix + '/add');
        });

        function edit(cloudId) {
            openModal('编辑云服务', prefix + '/edit/' + cloudId);
        }

        function remove(cloudId) {
            $.modal.confirm('确定要删除该云服务吗？', function() {
                $.ajax({
                    url: prefix + '/remove',
                    type: 'post',
                    data: { 'ids': cloudId },
                    success: function(data) {
                        if (data.code === 0) {
                            $.modal.msgSuccess(data.msg);
                            reLoad();
                        } else {
                            $.modal.msgError(data.msg);
                        }
                    }
                });
            });
        }

        $('#btnDelete').click(function() {
            var rows = $('#bootstrap-table').bootstrapTable('getSelections');
            if (rows.length == 0) {
                $.modal.msgWarning('请选择要删除的云服务');
                return;
            }
            var ids = [];
            $.each(rows, function(i, row) {
                ids.push(row.cloudId);
            });
            $.modal.confirm('确定要删除选中的云服务吗？', function() {
                $.ajax({
                    url: prefix + '/remove',
                    type: 'post',
                    data: { 'ids': ids.join(',') },
                    success: function(data) {
                        if (data.code === 0) {
                            $.modal.msgSuccess(data.msg);
                            reLoad();
                        } else {
                            $.modal.msgError(data.msg);
                        }
                    }
                });
            });
        });

        function testConnection(cloudId) {
            var row = $('#bootstrap-table').bootstrapTable('getRowByUniqueId', cloudId);
            if (row) {
                $.ajax({
                    url: prefix + '/testConnection',
                    type: 'post',
                    data: { 'cloudId': cloudId, 'cloudType': row.cloudType, 'accessKey': row.accessKey, 'secretKey': row.secretKey, 'region': row.region },
                    success: function(data) {
                        $.modal.msgSuccess(data.msg);
                    }
                });
            }
        }

        $('#btnTest').click(function() {
            var rows = $('#bootstrap-table').bootstrapTable('getSelections');
            if (rows.length != 1) {
                $.modal.msgWarning('请选择一个云服务进行测试');
                return;
            }
            testConnection(rows[0].cloudId);
        });

        function listResources(cloudId) {
            $.ajax({
                url: prefix + '/listResources',
                type: 'post',
                data: { 'cloudId': cloudId },
                success: function(data) {
                    $.modal.msgSuccess(data.msg);
                }
            });
        }

        $('#btnListResources').click(function() {
            var rows = $('#bootstrap-table').bootstrapTable('getSelections');
            if (rows.length != 1) {
                $.modal.msgWarning('请选择一个云服务');
                return;
            }
            listResources(rows[0].cloudId);
        });

        $('#btnExcel').click(function() {
            window.location.href = prefix + '/export?' + $('#formSearch').serialize();
        });

        $('#reset').click(function() {
            $('#formSearch')[0].reset();
        });
    </script>
</body>
</html>
