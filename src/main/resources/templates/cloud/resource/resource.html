<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>云资源管理</title>
    <#include "../include.html" />
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>云资源管理</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                                <i class="fa fa-wrench"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-user">
                                <li><a href="#">导出数据</a></li>
                            </ul>
                            <a class="close-link">
                                <i class="fa fa-times"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-sm-12">
                                <form id="form-search" class="form-inline">
                                    <div class="form-group">
                                        <label class="sr-only" for="serviceId">服务ID</label>
                                        <input type="number" class="form-control" id="serviceId" name="serviceId" placeholder="服务ID">
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="resourceName">资源名称</label>
                                        <input type="text" class="form-control" id="resourceName" name="resourceName" placeholder="资源名称">
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="resourceType">资源类型</label>
                                        <input type="text" class="form-control" id="resourceType" name="resourceType" placeholder="资源类型">
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="status">状态</label>
                                        <input type="text" class="form-control" id="status" name="status" placeholder="状态">
                                    </div>
                                    <button type="button" class="btn btn-primary" onclick="$.table.search()">
                                        <i class="fa fa-search"></i> 搜索
                                    </button>
                                    <button type="button" class="btn btn-white" onclick="$.form.reset()">
                                        <i class="fa fa-refresh"></i> 重置
                                    </button>
                                    <button type="button" class="btn btn-success" onclick="$.operate.add()">
                                        <i class="fa fa-plus"></i> 新增
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="row">
                            <div class="col-sm-12">
                                <table id="bootstrap-table" class="table table-striped table-bordered table-hover"></table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "云资源",
                columns: [
                    {
                        checkbox: true
                    },
                    {
                        field: 'resourceId',
                        title: '资源ID',
                        sortable: true
                    },
                    {
                        field: 'serviceId',
                        title: '服务ID',
                        sortable: true
                    },
                    {
                        field: 'resourceName',
                        title: '资源名称',
                        sortable: true
                    },
                    {
                        field: 'resourceType',
                        title: '资源类型',
                        sortable: true
                    },
                    {
                        field: 'resourceIdCloud',
                        title: '云平台资源ID',
                        sortable: true
                    },
                    {
                        field: 'status',
                        title: '状态',
                        sortable: true
                    },
                    {
                        field: 'createTime',
                        title: '创建时间',
                        sortable: true
                    },
                    {
                        field: 'updateTime',
                        title: '更新时间',
                        sortable: true
                    },
                    {
                        field: 'remark',
                        title: '备注'
                    },
                    {
                        title: '操作',
                        align: 'center',
                        formatter: function(value, row, index) {
                            var actions = [];
                            actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="createResource(' + row.serviceId + ')"><i class="fa fa-plus"></i> 创建资源</a> ');
                            actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="deleteResource(' + row.resourceId + ')"><i class="fa fa-trash"></i> 删除资源</a> ');
                            actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="getResourceStatus(' + row.resourceId + ')"><i class="fa fa-refresh"></i> 刷新状态</a> ');
                            actions.push('<a class="btn btn-primary btn-xs" href="javascript:void(0)" onclick="$.operate.edit(' + row.resourceId + ')"><i class="fa fa-edit"></i> 编辑</a> ');
                            actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(' + row.resourceId + ')"><i class="fa fa-remove"></i> 删除</a> ');
                            return actions.join('');
                        }
                    }
                ]
            };
            $.table.init(options);
        });

        function createResource(serviceId) {
            var html = '';
            html += '<div class="form-group">';
            html += '<label class="col-sm-3 control-label">资源名称：</label>';
            html += '<div class="col-sm-8"><input type="text" class="form-control" id="resourceName" name="resourceName" required></div>';
            html += '</div>';
            html += '<div class="form-group">';
            html += '<label class="col-sm-3 control-label">资源类型：</label>';
            html += '<div class="col-sm-8"><input type="text" class="form-control" id="resourceType" name="resourceType" required></div>';
            html += '</div>';
            html += '<div class="form-group">';
            html += '<label class="col-sm-3 control-label">资源参数：</label>';
            html += '<div class="col-sm-8"><textarea class="form-control" id="params" name="params" rows="3"></textarea></div>';
            html += '</div>';
            
            layer.open({
                type: 1,
                title: '创建云资源',
                area: ['500px', '300px'],
                content: '<form id="create-form" class="form-horizontal m-t"><div class="ibox-content">' + html + '</div></form>',
                btn: ['确定', '取消'],
                btn1: function(index, layero) {
                    var resourceName = $('#resourceName').val();
                    var resourceType = $('#resourceType').val();
                    var params = $('#params').val();
                    
                    if (!resourceName || !resourceType) {
                        layer.msg('请填写必要参数', {icon: 2});
                        return;
                    }
                    
                    $.ajax({
                        type: 'post',
                        url: prefix + '/create',
                        data: {
                            serviceId: serviceId,
                            resourceName: resourceName,
                            resourceType: resourceType,
                            params: params
                        },
                        success: function(result) {
                            if (result.code == 0) {
                                layer.msg('资源创建成功', {icon: 1});
                                layer.close(index);
                                $.table.refresh();
                            } else {
                                layer.msg(result.msg, {icon: 2});
                            }
                        }
                    });
                }
            });
        }

        function deleteResource(resourceId) {
            layer.confirm('确定要删除该云资源吗？', function(index) {
                $.ajax({
                    type: 'post',
                    url: prefix + '/delete',
                    data: {resourceId: resourceId},
                    success: function(result) {
                        if (result.code == 0) {
                            layer.msg('资源删除成功', {icon: 1});
                            $.table.refresh();
                        } else {
                            layer.msg(result.msg, {icon: 2});
                        }
                    }
                });
                layer.close(index);
            });
        }

        function getResourceStatus(resourceId) {
            $.ajax({
                type: 'post',
                url: prefix + '/status',
                data: {resourceId: resourceId},
                success: function(result) {
                    if (result.code == 0) {
                        layer.msg('状态：' + result.data, {icon: 1});
                        $.table.refresh();
                    } else {
                        layer.msg(result.msg, {icon: 2});
                    }
                }
            });
        }
    </script>
</body>
</html>
